<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<title>Python for Java Developers — Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181b25;
  --surface2: #1e2230;
  --border: #2a2e3d;
  --text: #e2e4ea;
  --text-dim: #8b8fa3;
  --java: #f89820;
  --java-bg: rgba(248,152,32,0.08);
  --java-border: rgba(248,152,32,0.25);
  --python: #4584b6;
  --python-bg: rgba(69,132,182,0.08);
  --python-border: rgba(69,132,182,0.25);
  --accent: #a78bfa;
  --accent-bg: rgba(167,139,250,0.08);
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --topbar-h: 52px;
  --bottomnav-h: 64px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { overflow-x: hidden; width: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg); color: var(--text);
  line-height: 1.65; font-size: 15px;
  -webkit-text-size-adjust: 100%;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(15,17,23,0.92); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  padding: 0 12px; height: var(--topbar-h);
  padding-top: env(safe-area-inset-top);
}
.hamburger {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); width: 38px; height: 38px; border-radius: 9px;
  font-size: 17px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.topbar-title {
  font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px;
  display: flex; align-items: center; gap: 7px; flex: 1; min-width: 0;
}
.topbar-title .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.topbar-title .java-dot { background: var(--java); }
.topbar-title .python-dot { background: var(--python); }
.topbar-title .arrow { color: var(--text-dim); font-size: 12px; }
.progress-track { position: absolute; bottom: 0; left: 0; height: 3px; width: 100%; background: var(--border); }
.progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--java), var(--python)); transition: width 0.4s ease; }

/* ── BACKDROP + SIDEBAR ── */
.backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 105; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.backdrop.show { opacity: 1; pointer-events: auto; }
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: 84vw; max-width: 330px; z-index: 110;
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; transform: translateX(-100%); transition: transform 0.28s ease;
  padding-top: env(safe-area-inset-top); -webkit-overflow-scrolling: touch;
}
.sidebar.open { transform: translateX(0); }
.sidebar-head { padding: 16px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.sidebar-close { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; }
.sidebar-section { padding: 16px 0 6px 16px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.3px; color: var(--text-dim); font-weight: 600; }
.sidebar-item { padding: 13px 16px; cursor: pointer; font-size: 14px; color: var(--text-dim); border-left: 2px solid transparent; display: flex; align-items: center; gap: 10px; }
.sidebar-item:active { background: var(--surface2); }
.sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-bg); }
.sidebar-item.completed .si-dot { background: var(--green); }
.si-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }

/* ── MAIN ── */
.main { margin-top: var(--topbar-h); padding: 18px 14px calc(var(--bottomnav-h) + env(safe-area-inset-bottom) + 24px); }
.module { animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.mod-header { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
.mod-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.mod-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
.mod-subtitle { color: var(--text-dim); font-size: 14px; }

/* ── CONCEPT MAP ── */
.concept-map { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin: 18px 0; position: relative; overflow: hidden; }
.concept-map::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--java), var(--python)); }
.cm-title { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--accent); }
.concept-map [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }

/* ── COMPARISON (always stacked) ── */
.comparison { display: block; margin: 18px 0; }
.comp-side { padding: 16px; margin-bottom: 2px; }
.comp-side.java { background: var(--java-bg); border: 1px solid var(--java-border); border-radius: 10px 10px 0 0; }
.comp-side.python { background: var(--python-bg); border: 1px solid var(--python-border); border-radius: 0 0 10px 10px; }
.comp-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.comp-label.java-label { color: var(--java); }
.comp-label.python-label { color: var(--python); }

pre { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; }
pre .kw { color: #c792ea; } pre .type { color: #82aaff; } pre .str { color: #c3e88d; }
pre .num { color: #f78c6c; } pre .cm { color: #546e7a; font-style: italic; } pre .fn { color: #82aaff; }
pre .op { color: #89ddff; } pre .dec { color: #ffd700; } pre .bi { color: #e06c75; } pre .self { color: #f07178; }

/* ── INSIGHT ── */
.insight { background: var(--surface); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; padding: 14px 16px; margin: 18px 0; font-size: 14px; }
.insight-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 12px; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.insight.gotcha { border-left-color: var(--yellow); } .insight.gotcha .insight-title { color: var(--yellow); }
.insight.win { border-left-color: var(--green); } .insight.win .insight-title { color: var(--green); }

/* ── DIAGRAM ── */
.diagram-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin: 18px 0; text-align: center; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.diagram-container svg { max-width: 100%; height: auto; }

/* ── TABS ── */
.tab-group { margin: 18px 0; }
.tab-headers { display: flex; gap: 0; border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.tab-headers::-webkit-scrollbar { display: none; }
.tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-dim); padding: 11px 16px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-panel { display: none; padding: 16px 0; }
.tab-panel.active { display: block; animation: fadeIn 0.3s ease; }

/* ── ANIMATION ── */
.anim-stage { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin: 18px 0; }

/* ── PROSE ── */
.prose { margin: 14px 0; font-size: 14.5px; }
.prose p { margin-bottom: 10px; }
.prose code { font-family: 'JetBrains Mono', monospace; background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 12.5px; color: var(--accent); overflow-wrap: anywhere; }

/* ── TABLE (scrollable) ── */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 18px 0; border: 1px solid var(--border); border-radius: 8px; }
.ref-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; }
.ref-table th { text-align: left; padding: 10px 12px; background: var(--surface2); color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.ref-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
.ref-table code { font-size: 12px; }

/* ── QUIZ ── */
.quiz-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin: 18px 0; }
.quiz-q { font-weight: 600; margin-bottom: 14px; font-size: 15px; }
.quiz-opt { display: block; width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 9px; padding: 14px 16px; margin-bottom: 9px; cursor: pointer; text-align: left; font-family: 'Inter', sans-serif; font-size: 14px; }
.quiz-opt:active { border-color: var(--accent); }
.quiz-opt.correct { border-color: var(--green); background: rgba(52,211,153,0.12); }
.quiz-opt.wrong { border-color: var(--red); background: rgba(248,113,113,0.12); }
.quiz-feedback { margin-top: 12px; font-size: 13px; display: none; }

/* ── BOTTOM NAV ── */
.bottomnav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 100;
  height: var(--bottomnav-h); background: rgba(24,27,37,0.96); backdrop-filter: blur(12px);
  border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
  padding: 0 12px calc(env(safe-area-inset-bottom));
}
.bn-btn { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 11px; height: 46px; font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
.bn-btn.primary { background: var(--accent); color: #0f1117; border-color: var(--accent); font-weight: 600; }
.bn-btn:disabled { opacity: 0.35; }
.bn-counter { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); flex-shrink: 0; min-width: 52px; text-align: center; }
</style>
</head>
<body>

<div class="topbar">
  <button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
  <div class="topbar-title">
    <span class="dot java-dot"></span>Java<span class="arrow">→</span><span class="dot python-dot"></span>Python
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-head"><span>Modules</span><button class="sidebar-close" id="sidebarClose">×</button></div>
  <div id="sidebarBody"></div>
</div>

<div class="main" id="mainContent"></div>

<div class="bottomnav">
  <button class="bn-btn" id="prevBtn">← Prev</button>
  <span class="bn-counter" id="modCounter">1 / 1</span>
  <button class="bn-btn primary" id="nextBtn">Next →</button>
</div>

<script>
const MODS = [
  {
    "id": "00-welcome",
    "title": "Your Java → Python Bridge",
    "eyebrow": "Welcome",
    "subtitle": "Everything you know still applies — just with less typing",
    "sections": [
      {
        "type": "concept-map",
        "title": "What Changes, What Stays",
        "content": "<div style=\"display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; text-align:center;\"><div style=\"background:rgba(52,211,153,0.08); border:1px solid rgba(52,211,153,0.25); border-radius:10px; padding:16px;\"><div style=\"color:var(--green); font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; margin-bottom:8px;\">SAME CONCEPTS</div><div style=\"font-size:13px; color:var(--text-dim);\">OOP, exceptions, iterators, modules, lambdas, generics (typing), decorators (annotations)</div></div><div style=\"background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.25); border-radius:10px; padding:16px;\"><div style=\"color:var(--yellow); font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; margin-bottom:8px;\">DIFFERENT SYNTAX</div><div style=\"font-size:13px; color:var(--text-dim);\">No braces → indentation, no semicolons, <code>def</code> not types, <code>self</code> explicit</div></div><div style=\"background:rgba(167,139,250,0.08); border:1px solid rgba(167,139,250,0.25); border-radius:10px; padding:16px;\"><div style=\"color:var(--accent); font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; margin-bottom:8px;\">NEW SUPERPOWERS</div><div style=\"font-size:13px; color:var(--text-dim);\">List comprehensions, duck typing, generators, unpacking, REPL, f-strings, slicing</div></div></div>"
      },
      {
        "type": "prose",
        "content": "<p>This course is structured as 12 focused modules. Each maps a Java concept you already know to its Python equivalent with side-by-side code, visual diagrams, and \"gotcha\" alerts for the tricky differences.</p><p>Your 20+ years of Java experience means you don't need to learn <em>programming</em> — you just need to learn Python's <em>dialect</em>. Think of it as learning Portuguese when you already speak Spanish.</p>"
      },
      {
        "type": "insight",
        "variant": "win",
        "title": "Your Advantage",
        "content": "Most Python tutorials waste time on \"what is a variable?\" — you can skip straight to the patterns. Each module here assumes you understand the Java side cold and focuses on the delta."
      },
      {
        "type": "table",
        "headers": [
          "Java Concept",
          "Python Equivalent",
          "Module"
        ],
        "rows": [
          [
            "Class / public static void main",
            "Script / <code>if __name__</code>",
            "1"
          ],
          [
            "Primitive types + String",
            "Everything is an object",
            "2"
          ],
          [
            "ArrayList, HashMap",
            "list, dict (built-in)",
            "3"
          ],
          [
            "for / while / switch",
            "for-in, while, match",
            "4"
          ],
          [
            "methods, overloading",
            "def, *args, **kwargs",
            "5"
          ],
          [
            "class, extends, implements",
            "class, inheritance, ABC",
            "6"
          ],
          [
            "try-catch-finally",
            "try-except-finally",
            "7"
          ],
          [
            "Streams API",
            "List comprehensions + generators",
            "8"
          ],
          [
            "java.io / java.nio",
            "open(), pathlib, os",
            "9"
          ],
          [
            "Maven / Gradle",
            "pip, venv, pyproject.toml",
            "10"
          ],
          [
            "Annotations + Reflection",
            "Decorators + inspect",
            "11"
          ],
          [
            "JUnit, Mockito",
            "pytest, unittest.mock",
            "12"
          ]
        ]
      }
    ],
    "slug": "welcome"
  },
  {
    "id": "01-program-structure",
    "title": "Program Structure & Entry Points",
    "eyebrow": "Module 01",
    "subtitle": "From public static void main to a clean script",
    "sections": [
      {
        "type": "comparison",
        "java": "<span class=\"cm\">// HelloWorld.java</span>\n<span class=\"kw\">public class</span> <span class=\"type\">HelloWorld</span> {\n    <span class=\"kw\">public static void</span> <span class=\"fn\">main</span>(<span class=\"type\">String</span>[] args) {\n        <span class=\"type\">System</span>.out.<span class=\"fn\">println</span>(<span class=\"str\">\"Hello, World!\"</span>);\n    }\n}",
        "python": "<span class=\"cm\"># hello.py</span>\n<span class=\"fn\">print</span>(<span class=\"str\">\"Hello, World!\"</span>)\n\n\n<span class=\"cm\"># That's it. No class wrapper needed.</span>\n<span class=\"cm\"># No main method. No semicolons.</span>\n<span class=\"cm\"># No compilation step.</span>"
      },
      {
        "type": "insight",
        "variant": "gotcha",
        "title": "Java Instinct to Override",
        "content": "Your muscle memory will want to write <code>public class</code> wrappers. Resist it — Python files ARE modules. A file <code>utils.py</code> is directly importable: <code>import utils</code>."
      },
      {
        "type": "comparison",
        "java": "<span class=\"cm\">// Java: a function MUST live in a class.</span>\n<span class=\"cm\">// Utility classes exist only to hold statics.</span>\n<span class=\"kw\">public final class</span> <span class=\"type\">TextUtils</span> {\n    <span class=\"kw\">private</span> <span class=\"fn\">TextUtils</span>() {}  <span class=\"cm\">// no instances</span>\n\n    <span class=\"kw\">public static</span> <span class=\"type\">String</span> <span class=\"fn\">slugify</span>(<span class=\"type\">String</span> s) {\n        <span class=\"kw\">return</span> s.<span class=\"fn\">toLowerCase</span>().<span class=\"fn\">replace</span>(<span class=\"str\">' '</span>, <span class=\"str\">'-'</span>);\n    }\n}\n<span class=\"cm\">// Call: TextUtils.slugify(\"Hello World\")</span>",
        "python": "<span class=\"cm\"># text_utils.py — the module IS the namespace</span>\n<span class=\"kw\">def</span> <span class=\"fn\">slugify</span>(s: <span class=\"type\">str</span>) -&gt; <span class=\"type\">str</span>:\n    <span class=\"kw\">return</span> s.<span class=\"fn\">lower</span>().<span class=\"fn\">replace</span>(<span class=\"str\">\" \"</span>, <span class=\"str\">\"-\"</span>)\n\n<span class=\"kw\">def</span> <span class=\"fn\">word_count</span>(s: <span class=\"type\">str</span>) -&gt; <span class=\"type\">int</span>:\n    <span class=\"kw\">return</span> <span class=\"bi\">len</span>(s.<span class=\"fn\">split</span>())\n\n<span class=\"cm\"># Call: text_utils.slugify(\"Hello World\")</span>\n<span class=\"cm\"># No class. No static. No private constructor.</span>"
      },
      {
        "type": "insight",
        "variant": "win",
        "title": "You Can Build a Whole App Without a Single Class",
        "content": "Java forces every function into a class — which is why the JDK is full of utility classes (<code>Collections</code>, <code>Files</code>, <code>Math</code>) that are just bags of statics. Python's <strong>module is already the namespace</strong>, so top-level functions are the norm, not a code smell. Plenty of production Python apps — CLIs, data pipelines, web handlers — are organized purely as modules and functions. Reach for a <code>class</code> only when you have <em>state and behavior to bundle together</em>; otherwise a function is the right unit. This is the heart of Python's function-first style."
      },
      {
        "type": "comparison",
        "java": "<span class=\"cm\">// Structured Java app</span>\n<span class=\"kw\">package</span> com.example.app;\n\n<span class=\"kw\">import</span> java.util.List;\n\n<span class=\"kw\">public class</span> <span class=\"type\">App</span> {\n    <span class=\"kw\">private</span> <span class=\"type\">String</span> name;\n\n    <span class=\"kw\">public</span> <span class=\"fn\">App</span>(<span class=\"type\">String</span> name) {\n        <span class=\"kw\">this</span>.name = name;\n    }\n\n    <span class=\"kw\">public static void</span> <span class=\"fn\">main</span>(<span class=\"type\">String</span>[] args) {\n        <span class=\"type\">App</span> app = <span class=\"kw\">new</span> <span class=\"type\">App</span>(<span class=\"str\">\"Demo\"</span>);\n        app.<span class=\"fn\">run</span>();\n    }\n}",
        "python": "<span class=\"cm\"># app.py</span>\n<span class=\"kw\">from</span> typing <span class=\"kw\">import</span> <span class=\"type\">Optional</span>\n\n<span class=\"kw\">class</span> <span class=\"type\">App</span>:\n    <span class=\"kw\">def</span> <span class=\"fn\">__init__</span>(<span class=\"self\">self</span>, name: <span class=\"type\">str</span>):\n        <span class=\"self\">self</span>.name = name\n\n    <span class=\"kw\">def</span> <span class=\"fn\">run</span>(<span class=\"self\">self</span>):\n        <span class=\"fn\">print</span>(<span class=\"str\">f\"Running {<span class=\"self\">self</span>.name}\"</span>)\n\n<span class=\"kw\">if</span> __name__ == <span class=\"str\">\"__main__\"</span>:\n    app = <span class=\"type\">App</span>(<span class=\"str\">\"Demo\"</span>)\n    app.<span class=\"fn\">run</span>()"
      },
      {
        "type": "insight",
        "variant": "",
        "title": "The __name__ Guard",
        "content": "<code>if __name__ == \"__main__\"</code> is Python's equivalent of <code>main()</code>. It runs only when the file is executed directly, not when imported as a module. This is how Python separates \"library code\" from \"script entry point\"."
      },
      {
        "type": "diagram",

          {
            "label": "The GIL",
            "content": "<div class=\"prose\"><p>Java threads run truly in parallel across cores. CPython has a <strong>Global Interpreter Lock</strong>: only one thread executes Python bytecode at a time. So <code>threading</code> helps <em>I/O-bound</em> work (waiting on network/disk) but gives <strong>no speedup for CPU-bound</strong> work.</p><pre><span class=\"cm\"># CPU-bound across 8 threads  ~= 1 thread (GIL-bound)</span>\n<span class=\"cm\"># I/O-bound across 8 threads  ~= 8x (threads wait, not compute)</span></pre><p>The instinct Java gave you — \"more threads = more CPU\" — does not hold in CPython.</p></div>"
          },
          {
            "label": "Pick the tool",
            "content": "<div class=\"prose\"><pre><span class=\"cm\"># I/O-bound, async libs    -&gt; asyncio (1 thread, event loop)</span>\n<span class=\"cm\"># I/O-bound, blocking libs -&gt; threading (ThreadPoolExecutor)</span>\n<span class=\"cm\"># CPU-bound, real parallel -&gt; multiprocessing</span>\n\n<span class=\"kw\">from</span> concurrent.futures <span class=\"kw\">import</span> ProcessPoolExecutor\n<span class=\"kw\">with</span> <span class=\"fn\">ProcessPoolExecutor</span>() <span class=\"kw\">as</span> pool:\n    results = <span class=\"bi\">list</span>(pool.<span class=\"fn\">map</span>(heavy_compute, jobs))\n<span class=\"cm\"># Separate processes each get their own GIL</span></pre></div>"
          },

    "sections": [
      {
        "type": "prose",
        "content": "<p>Python's <strong>DB-API 2.0</strong> (PEP 249) is the <code>JDBC</code> of the Python world: one standard interface, many drivers. <code>sqlite3</code> ships with the stdlib; for real databases <code>pip install</code> a driver — <code>psycopg</code> (PostgreSQL), <code>mysqlclient</code> (MySQL), <code>asyncpg</code> (async Postgres). On top sits <strong>SQLAlchemy</strong>, the JPA/Hibernate analog.</p>"

let currentMod = 0;
const completed = new Set();

function renderSidebar() {
  let html = '';
  const idx = {}; MODS.forEach((m, i) => idx[m.id] = i);
  for (const [group, ids] of Object.entries(SIDEBAR_GROUPS)) {
    html += `<div class="sidebar-section">${group}</div>`;
    ids.forEach(id => {
      const i = idx[id]; if (i === undefined) return;
      const m = MODS[i];
      const label = m.eyebrow ? m.eyebrow + ': ' : '';
      const title = m.title.length > 26 ? m.title.slice(0,26)+'…' : m.title;
      html += `<div class="sidebar-item ${i===currentMod?'active':''} ${completed.has(i)?'completed':''}" onclick="goTo(${i})"><span class="si-dot"></span>${label}${title}</div>`;
    });
  }
  document.getElementById('sidebarBody').innerHTML = html;
}

function renderSection(sec, modIdx, secIdx) {
  switch(sec.type) {
    case 'comparison':
      return `<div class="comparison">
        <div class="comp-side java"><div class="comp-label java-label">☕ Java</div><pre>${sec.java}</pre></div>
        <div class="comp-side python"><div class="comp-label python-label">🐍 Python</div><pre>${sec.python}</pre></div>
      </div>`;
    case 'insight':
      const vIcon = sec.variant === 'gotcha' ? '⚠️ ' : sec.variant === 'win' ? '✨ ' : '';
      return `<div class="insight ${sec.variant||''}"><div class="insight-title">${vIcon}${sec.title}</div><div>${sec.content}</div></div>`;
    case 'concept-map':
      return `<div class="concept-map"><div class="cm-title">🗺️ ${sec.title}</div>${sec.content}</div>`;
    case 'table':
      return `<div class="table-scroll"><table class="ref-table"><thead><tr>${sec.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${sec.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
    case 'prose':
      return `<div class="prose">${sec.content}</div>`;
    case 'quiz':
      const qid = `quiz_${modIdx}_${secIdx}`;
      return `<div class="quiz-block" id="${qid}"><div class="quiz-q">🧪 ${sec.question}</div>${sec.options.map((o,oi)=>`<button class="quiz-opt" onclick="checkQuiz('${qid}',${oi},${sec.correct})">${o}</button>`).join('')}<div class="quiz-feedback" id="${qid}_fb">${sec.explanation}</div></div>`;
    case 'diagram':
      return `<div class="diagram-container">${sec.title?`<div class="cm-title">📐 ${sec.title}</div>`:''}${sec.svg||''}</div>`;
    case 'animation':
      return `<div class="anim-stage">${sec.title?`<div class="cm-title">🎬 ${sec.title}</div>`:''}${sec.html||''}</div>`;
    case 'tab-group':
      const tgid = `tabs_${modIdx}_${secIdx}`;
      return `<div class="tab-group">${sec.title?`<div class="cm-title">🧩 ${sec.title}</div>`:''}<div class="tab-headers">${sec.tabs.map((t,ti)=>`<button class="tab-btn ${ti===0?'active':''}" onclick="switchTab('${tgid}',${ti})">${t.label}</button>`).join('')}</div>${sec.tabs.map((t,ti)=>`<div class="tab-panel ${ti===0?'active':''}" id="${tgid}_${ti}">${t.content}</div>`).join('')}</div>`;
    default:
      return `<div class="prose"><p><em>Unknown section: ${sec.type}</em></p></div>`;
  }
}

function renderModule(idx) {
  const mod = MODS[idx];
  let html = `<div class="module"><div class="mod-header"><div class="mod-eyebrow">${mod.eyebrow||''}</div><div class="mod-title">${mod.title}</div><div class="mod-subtitle">${mod.subtitle||''}</div></div>`;
  mod.sections.forEach((sec, si) => { html += renderSection(sec, idx, si); });
  html += `</div>`;
  document.getElementById('mainContent').innerHTML = html;
}

function checkQuiz(qid, selected, correct) {
  const block = document.getElementById(qid);
  block.querySelectorAll('.quiz-opt').forEach((o,i) => {
    o.disabled = true;
    if (i === correct) o.classList.add('correct');
    else if (i === selected && selected !== correct) o.classList.add('wrong');
  });
  const fb = document.getElementById(qid+'_fb');
  fb.style.display = 'block';
  fb.style.color = selected === correct ? 'var(--green)' : 'var(--red)';
}

function switchTab(tgid, idx) {
  const panels = document.querySelectorAll(`[id^="${tgid}_"]`);
  const btns = panels[0]?.closest('.tab-group')?.querySelectorAll('.tab-btn') || [];
  panels.forEach((p,i) => p.classList.toggle('active', i === idx));
  btns.forEach((b,i) => b.classList.toggle('active', i === idx));
}

function updateUI() {
  document.getElementById('modCounter').textContent = `${currentMod+1} / ${MODS.length}`;
  document.getElementById('prevBtn').disabled = currentMod === 0;
  const next = document.getElementById('nextBtn');
  next.disabled = false;
  next.innerHTML = currentMod === MODS.length-1 ? '🎉 Done' : 'Next →';
  document.getElementById('progressFill').style.width = `${((currentMod+1)/MODS.length)*100}%`;
  renderSidebar();
  renderModule(currentMod);
  window.scrollTo({top:0, behavior:'smooth'});
}

function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('backdrop').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('backdrop').classList.remove('show'); }

function goTo(i) {
  if (currentMod !== i) completed.add(currentMod);
  currentMod = Math.max(0, Math.min(MODS.length-1, i));
  syncHash();
  updateUI();
  closeSidebar();
}
function next() { if (currentMod < MODS.length-1) goTo(currentMod+1); }
function prev() { if (currentMod > 0) goTo(currentMod-1); }

document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('hamburger').addEventListener('click', openSidebar);
document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
document.getElementById('backdrop').addEventListener('click', closeSidebar);

// Swipe navigation
let touchX = null, touchY = null;
document.getElementById('mainContent').addEventListener('touchstart', e => {
  touchX = e.changedTouches[0].clientX; touchY = e.changedTouches[0].clientY;
}, {passive: true});
document.getElementById('mainContent').addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.8) {
    if (dx < 0) next(); else prev();
  }
  touchX = touchY = null;
}, {passive: true});

// Deep-linking: keep the URL hash in sync with the current module (…/#program-structure)
function syncHash(){ var m = MODS[currentMod]; if (m && m.slug && decodeURIComponent(location.hash).replace(/^#/,'') !== m.slug) location.hash = m.slug; }
function moduleIdxFromHash(){
  var h = decodeURIComponent(location.hash || '').replace(/^#/,'').toLowerCase();
  if (!h) return -1;
  return MODS.findIndex(function(m){ return m.slug === h || String(m.id).toLowerCase() === h; });  // pretty slug or numeric id
}
function goToHash(){ var i = moduleIdxFromHash(), t = i >= 0 ? i : 0; if (t !== currentMod) goTo(t); }
window.addEventListener('hashchange', goToHash);
(function(){  // boot — honor a #slug deep link, else module 0 (without marking it completed)
  var b = moduleIdxFromHash();
  currentMod = b >= 0 ? b : 0;
  var m = MODS[currentMod];
  if (m && m.slug && decodeURIComponent(location.hash).replace(/^#/,'') !== m.slug) history.replaceState(null, '', '#' + m.slug);
  updateUI();
})();
